apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace 'com.yourpackage.floatball'
    compileSdk 34

    defaultConfig {
        applicationId "com.yourpackage.floatball"
        minSdkVersion 16
        targetSdkVersion 19
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    buildTypes {
        debug {
            // 不做任何混淆/压缩，避免老API的兼容性意外
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.10'
}
